# Run the game as a Docker service:
#   docker compose up -d --build      # build + start in the background
#   docker compose logs -f            # follow logs
#   docker compose down               # stop & remove the container (keeps saves)
#   docker compose down -v            # stop & ALSO delete the saved-worlds volume
services:
  sgsimulation:
    build: .
    image: sgsimulation
    container_name: sgsimulation
    ports:
      - "3000:3000"          # host:container — change the left number to remap
    environment:
      - PORT=3000
      - TRACE_EDIT=1         # enable the tracer's "💾 Save to map" (writes the base map)
    volumes:
      - sgdata:/app/data     # persists data/worlds.db across restarts
      # "💾 Save to map" writes roads INSIDE the container — always works (the running
      # server serves the update live, just refresh the game). It resets on the next
      # rebuild, so to KEEP an edit use the tracer's "⬇ Export full map" and commit it
      # (or copy it out: docker compose cp sgsimulation:/app/public/js/roads1966.js public/js/).
      #
      # OPTIONAL — write saves straight to your host repo instead (persist + git-track).
      # This needs the host public/ writable by the container; cloned repos are often
      # root-owned, so ALSO uncomment the `user:` line below to run the container as
      # root (otherwise saves fail with EACCES, since the app runs as uid 1000):
      # - ./public:/app/public
    # user: "0:0"            # uncomment together with the ./public mount above
    restart: unless-stopped

volumes:
  sgdata:
