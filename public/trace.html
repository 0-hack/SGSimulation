<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>SG 1966 Map Tracer</title>
<style>
  :root { --bar: #1d2330; --accent: #4c8bf5; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; font: 13px/1.4 system-ui, sans-serif; background: #0e1118; color: #e7ebf2; }
  #bar { position: fixed; top: 0; left: 0; right: 0; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
         padding: 6px 8px; background: var(--bar); border-bottom: 1px solid #000; z-index: 10; }
  .grp { display: flex; gap: 4px; align-items: center; padding: 2px 6px; border-right: 1px solid #333a; }
  .grp > small { opacity: .65; }
  button, label.btn, select { background: #2a3243; color: #e7ebf2; border: 1px solid #3a4356; border-radius: 6px;
           padding: 6px 9px; cursor: pointer; font-size: 12.5px; }
  button:hover { background: #344056; }
  button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.lay { border-left: 6px solid var(--c); }
  button.lay.on { background: #344056; border-color: var(--c); }
  button.vis { padding: 5px 7px; font-size: 11.5px; border-left: 6px solid var(--c); opacity: .45; }
  button.vis.on { opacity: 1; }
  input[type=range] { width: 76px; vertical-align: middle; }
  #hint { position: fixed; left: 8px; bottom: 8px; background: #000b; padding: 6px 10px; border-radius: 8px; z-index: 10; max-width: 58ch; }
  #stat { margin-left: auto; opacity: .85; text-align: right; font-size: 11.5px; }
  #stat b { color: #fff; }
  canvas { display: block; position: fixed; inset: 0; touch-action: none; cursor: crosshair; }
</style>
</head>
<body>
<div id="bar">
  <div class="grp">
    <button id="m-draw" class="on">✏️ Draw</button>
    <button id="m-erase">🧽 Erase</button>
    <button id="m-pan">✋ Pan</button>
  </div>
  <div class="grp" id="layers" title="What you're tracing. Draw/Erase act on this layer."><small>trace</small></div>
  <div class="grp">
    <button id="oneway" title="Tag roads as ONE-WAY (drawn in the direction of travel)">➔ One-way</button>
    <button id="freehand" class="on" title="Freehand: hold &amp; drag. Click: tap vertices, double-click/Enter to finish.">Freehand</button>
    <span><small>brush</small> <input id="brush" type="range" min="4" max="40" value="14"></span>
  </div>
  <div class="grp" id="bldgrp" title="Airport buildings — active on the Buildings layer. Drag a box for the footprint.">
    <small>bldg</small>
    <select id="btype">
      <option value="terminal">Terminal</option><option value="hangar">Hangar</option>
      <option value="pier">Pier</option><option value="hall">Low hall</option>
      <option value="block">Block</option><option value="shed">Workshop</option>
      <option value="carpark">Car park</option><option value="plane">Aircraft</option>
    </select>
    <span><small>rot</small> <input id="brot" type="range" min="-180" max="180" value="0"></span>
    <span><small>tall</small> <input id="bhgt" type="range" min="3" max="30" value="10"></span>
  </div>
  <div class="grp" id="vis" title="Show / hide layers"><small>show</small></div>
  <div class="grp"><span><small>map</small> <input id="opacity" type="range" min="0" max="100" value="55"></span></div>
  <div class="grp" title="Nudge the background map to line it up with your trace">
    <small>align</small>
    <button id="al">◀</button><button id="ar">▶</button><button id="au">▲</button><button id="ad">▼</button>
    <button id="sxm">－X</button><button id="sxp">＋X</button><button id="sym">－Y</button><button id="syp">＋Y</button>
    <button id="areset">⟳</button>
  </div>
  <div class="grp">
    <button id="undo">↶ Undo</button><button id="fit">Fit</button>
    <button id="clear" style="background:#5a2a2a;border-color:#7a3a3a">Clear layer</button>
  </div>
  <div class="grp">
    <button id="save">💾 Save</button>
    <label class="btn">📂 Load<input id="load" type="file" accept="application/json" hidden></label>
  </div>
  <div id="stat"></div>
</div>
<canvas id="c"></canvas>
<div id="hint">Loading map…</div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);
let DATA = null, bgImg = new Image();

// kind: 'line' polylines, 'rect' rotated building footprints.
const LAYERS = {
  roads:      { c: '#37d0ff', name: 'Roads',     kind: 'line' },
  mainland:   { c: '#7CFC8A', name: 'Mainland',  kind: 'line', closed: true },
  islands:    { c: '#2ee6c4', name: 'Islands',   kind: 'line', closed: true },
  reservoirs: { c: '#c85cff', name: 'Reservoir', kind: 'line', closed: true },
  airport:    { c: '#ff5a5a', name: 'Airport',   kind: 'line' },
  buildings:  { c: '#ff6ec7', name: 'Buildings', kind: 'rect' },
  foreign:    { c: '#c9a06a', name: 'Malaysia',  kind: 'line', closed: true },
};
const KEYS = Object.keys(LAYERS);
const ONEWAY_COLOR = '#ff9f43';
// roads:[{pts,oneway}]; buildings:[{type,cx,cy,w,h,rot,hgt}]; others:[ [[nx,ny]...] ]
let data = { roads: [], mainland: [], islands: [], reservoirs: [], airport: [], buildings: [], foreign: [] };
let active = 'roads', oneway = false, freehand = true, mode = 'draw';
let vis = {}; KEYS.forEach(k => vis[k] = true); vis.guide = true;
let opacity = 0.55, brush = 14, bType = 'terminal', bRot = 0, bHgt = 1.0;
let view = { zoom: 1, offX: 0, offY: 0, unit: 1000 };
let bg = { offX: 0, offY: 0, scaleX: 1, scaleY: 1 };
let cur = null, history = [], rectStart = null, rectNow = null;

for (const k of KEYS) {
  const b = document.createElement('button'); b.className = 'lay' + (k === 'roads' ? ' on' : ''); b.style.setProperty('--c', LAYERS[k].c);
  b.textContent = LAYERS[k].name; b.onclick = () => setLayer(k); b.id = 'L-' + k; $('layers').appendChild(b);
}
for (const k of [...KEYS, 'guide']) {
  const b = document.createElement('button'); b.className = 'vis on'; b.style.setProperty('--c', k === 'guide' ? '#ffd23f' : LAYERS[k].c);
  b.textContent = k === 'guide' ? 'Guide' : LAYERS[k].name.slice(0, 4); b.id = 'v-' + k;
  b.onclick = () => { vis[k] = !vis[k]; b.classList.toggle('on', vis[k]); draw(); }; $('vis').appendChild(b);
}

function snapshot() { history.push(JSON.stringify(data)); if (history.length > 80) history.shift(); }
function undo() { if (history.length) { data = JSON.parse(history.pop()); cur = null; rectStart = null; draw(); updateStat(); } }
function resize() { cv.width = innerWidth; cv.height = innerHeight; draw(); }
addEventListener('resize', resize);

function toScreen(nx, ny) { return [nx * view.unit * view.zoom + view.offX, (1 - ny) * view.unit * view.zoom + view.offY]; }
function toGame(sx, sy) { return [(sx - view.offX) / (view.unit * view.zoom), 1 - (sy - view.offY) / (view.unit * view.zoom)]; }
function fitView() {
  const x0 = -0.02, x1 = 0.82, y0 = 0.14, y1 = 0.82, w = cv.width, h = cv.height - 50;
  view.unit = 1000; view.zoom = Math.min(w / (x1 - x0), h / (y1 - y0)) / 1000;
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  view.offX = cv.width / 2 - cx * view.unit * view.zoom; view.offY = (cv.height + 50) / 2 - (1 - cy) * view.unit * view.zoom; draw();
}
function bgRect() {
  const b = DATA.bg, cxg = (b.gxL + b.gxR) / 2, cyg = (b.gyB + b.gyT) / 2;
  const X = g => (g - cxg) * bg.scaleX + cxg + bg.offX, Y = g => (g - cyg) * bg.scaleY + cyg + bg.offY;
  const [x0, yTop] = toScreen(X(b.gxL), Y(b.gyT)), [x1, yBot] = toScreen(X(b.gxR), Y(b.gyB));
  return { x: x0, y: yTop, w: x1 - x0, h: yBot - yTop };
}
function strokePoly(pts, close) {
  if (!pts.length) return;
  ctx.beginPath(); pts.forEach(([nx, ny], i) => { const [x, y] = toScreen(nx, ny); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  if (close) ctx.closePath();
  if (pts.length === 1) { const [x, y] = toScreen(pts[0][0], pts[0][1]); ctx.arc(x, y, 2, 0, 7); }
  ctx.stroke();
}
function drawArrows(pts) {
  let acc = 0;
  for (let i = 1; i < pts.length; i++) {
    const [ax, ay] = toScreen(pts[i - 1][0], pts[i - 1][1]), [bx, by] = toScreen(pts[i][0], pts[i][1]);
    const dx = bx - ax, dy = by - ay, len = Math.hypot(dx, dy); if (!len) continue; acc += len;
    if (acc >= 34) { acc = 0; const ux = dx / len, uy = dy / len, s = 7;
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - ux * s - uy * s * 0.6, by - uy * s + ux * s * 0.6);
      ctx.moveTo(bx, by); ctx.lineTo(bx - ux * s + uy * s * 0.6, by - uy * s - ux * s * 0.6); ctx.stroke(); }
  }
}
function bCorners(b) {
  const r = (b.rot || 0) * Math.PI / 180, c = Math.cos(r), s = Math.sin(r), hw = b.w / 2, hh = b.h / 2;
  return [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]].map(([dx, dy]) => [b.cx + dx * c - dy * s, b.cy + dx * s + dy * c]);
}
function drawBuilding(b, ghost) {
  ctx.strokeStyle = ghost ? '#ff6ec788' : LAYERS.buildings.c; ctx.lineWidth = 2;
  strokePoly(bCorners(b), true);
  const [lx, ly] = toScreen(b.cx, b.cy); ctx.fillStyle = LAYERS.buildings.c; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(b.type[0].toUpperCase() + (b.type === 'plane' ? '✈' : ''), lx, ly + 4);
  // a short tick on the +Z (facing) edge so orientation is visible
  const r = (b.rot || 0) * Math.PI / 180; const [fx, fy] = toScreen(b.cx - Math.sin(r) * b.h * 0.5, b.cy + Math.cos(r) * b.h * 0.5);
  ctx.beginPath(); ctx.arc(fx, fy, 3, 0, 7); ctx.stroke();
}
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height); ctx.fillStyle = '#0e1118'; ctx.fillRect(0, 0, cv.width, cv.height);
  if (bgImg.complete && bgImg.naturalWidth) { const r = bgRect(); ctx.globalAlpha = opacity; ctx.drawImage(bgImg, r.x, r.y, r.w, r.h); ctx.globalAlpha = 1; }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (vis.guide && DATA) { ctx.lineWidth = 1.3; ctx.strokeStyle = '#ffd23f'; ctx.setLineDash([5, 5]);
    strokePoly(DATA.outline, true); ctx.strokeStyle = '#ffd23f55'; DATA.islands.forEach(p => strokePoly(p, true)); ctx.setLineDash([]); }
  for (const k of ['foreign', 'reservoirs', 'islands', 'mainland', 'airport', 'roads', 'buildings']) {
    if (!vis[k]) continue; const L = LAYERS[k];
    if (k === 'buildings') { data.buildings.forEach(b => drawBuilding(b, false)); continue; }
    ctx.lineWidth = k === 'mainland' ? 2.6 : 2.2;
    if (k === 'roads') { for (const r of data.roads) { ctx.strokeStyle = r.oneway ? ONEWAY_COLOR : L.c; strokePoly(r.pts, false); if (r.oneway) drawArrows(r.pts); } }
    else { ctx.strokeStyle = L.c; for (const p of data[k]) strokePoly(p, L.closed); }
  }
  if (cur) { ctx.lineWidth = 2.6; ctx.strokeStyle = (active === 'roads' && oneway) ? ONEWAY_COLOR : LAYERS[active].c; ctx.globalAlpha = 0.85; strokePoly(cur, false); ctx.globalAlpha = 1; }
  if (rectStart && rectNow) drawBuilding(rectToBldg(rectStart, rectNow), true);
  if (mode === 'erase' && lastPt) { ctx.strokeStyle = '#e2503b'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(lastPt.sx, lastPt.sy, brush, 0, 7); ctx.stroke(); }
}
function rectToBldg(a, b) { return { type: bType, cx: (a[0] + b[0]) / 2, cy: (a[1] + b[1]) / 2, w: Math.abs(a[0] - b[0]), h: Math.abs(a[1] - b[1]), rot: bRot, hgt: bHgt }; }
function layerList() { return data[active]; }
function ptsOf(item) { return active === 'roads' ? item.pts : item; }
function wrap(run, item) { return active === 'roads' ? { pts: run, oneway: item ? item.oneway : oneway } : run; }
function updateStat() {
  $('stat').innerHTML = KEYS.map(k => { const n = data[k].length; const ow = k === 'roads' ? ` (${data.roads.filter(r => r.oneway).length}→)` : ''; return `<b>${n}</b> ${LAYERS[k].name.slice(0, 4)}${ow}`; }).join(' · ');
}

let drawing = false, panning = false, panStart = null, lastPt = null; const keys = {};
function evPos(e) { const r = cv.getBoundingClientRect(); return { sx: e.clientX - r.left, sy: e.clientY - r.top }; }
function isRect() { return LAYERS[active].kind === 'rect'; }
cv.addEventListener('pointerdown', e => {
  cv.setPointerCapture(e.pointerId); const p = evPos(e); lastPt = p;
  if (mode === 'pan' || e.button === 1 || e.button === 2 || keys[' ']) { panning = true; panStart = { ...p, offX: view.offX, offY: view.offY }; return; }
  if (mode === 'draw') {
    if (isRect()) { snapshot(); rectStart = toGame(p.sx, p.sy); rectNow = rectStart; drawing = true; return; }
    const g = toGame(p.sx, p.sy);
    if (freehand) { snapshot(); cur = [g]; drawing = true; } else { if (!cur) { snapshot(); cur = []; } cur.push(g); draw(); }
  } else if (mode === 'erase') { snapshot(); drawing = true; eraseAt(p); }
});
cv.addEventListener('pointermove', e => {
  const p = evPos(e); lastPt = p;
  if (panning) { view.offX = panStart.offX + (p.sx - panStart.sx); view.offY = panStart.offY + (p.sy - panStart.sy); draw(); return; }
  if (mode === 'draw' && isRect() && rectStart) { rectNow = toGame(p.sx, p.sy); draw(); return; }
  if (mode === 'draw' && freehand && drawing && cur) { const g = toGame(p.sx, p.sy), last = cur[cur.length - 1];
    if (Math.hypot(g[0] - last[0], g[1] - last[1]) > 0.0015) { cur.push(g); draw(); } }
  else if (mode === 'erase' && drawing) eraseAt(p);
  else if (mode === 'draw' && !freehand && cur) { draw(); const [x0, y0] = toScreen(...cur[cur.length - 1]); ctx.strokeStyle = '#fff8'; ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(p.sx, p.sy); ctx.stroke(); }
  else if (mode === 'erase') draw();
});
function finishCur() { if (cur && cur.length >= 2) layerList().push(wrap(cur, null)); cur = null; }
function endStroke() {
  if (mode === 'draw' && isRect() && rectStart) { const b = rectToBldg(rectStart, rectNow); if (b.w > 0.001 && b.h > 0.001) data.buildings.push(b); rectStart = rectNow = null; }
  else if (mode === 'draw' && freehand && drawing) finishCur();
  drawing = false; panning = false; draw(); updateStat();
}
cv.addEventListener('pointerup', endStroke); cv.addEventListener('pointercancel', endStroke);
cv.addEventListener('contextmenu', e => e.preventDefault());
cv.addEventListener('dblclick', () => { if (mode === 'draw' && !freehand && !isRect()) { finishCur(); draw(); updateStat(); } });
cv.addEventListener('wheel', e => { e.preventDefault(); const p = evPos(e), g = toGame(p.sx, p.sy);
  view.zoom = Math.max(0.1, Math.min(120, view.zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12)));
  view.offX = p.sx - g[0] * view.unit * view.zoom; view.offY = p.sy - (1 - g[1]) * view.unit * view.zoom; draw(); }, { passive: false });
function eraseAt(p) {
  const gp = toGame(p.sx, p.sy);
  if (isRect()) { // remove buildings whose centre is near, or that contain the point
    data.buildings = data.buildings.filter(b => {
      const r = (b.rot || 0) * Math.PI / 180, c = Math.cos(-r), s = Math.sin(-r), ox = gp[0] - b.cx, oy = gp[1] - b.cy;
      const lx = ox * c - oy * s, ly = ox * s + oy * c;
      return !(Math.abs(lx) <= b.w / 2 && Math.abs(ly) <= b.h / 2);
    });
    draw(); updateStat(); return;
  }
  const radG = brush / (view.unit * view.zoom), out = [];
  for (const item of layerList()) { let run = [];
    for (const pt of ptsOf(item)) { if (Math.hypot(pt[0] - gp[0], pt[1] - gp[1]) <= radG) { if (run.length >= 2) out.push(wrap(run, item)); run = []; } else run.push(pt); }
    if (run.length >= 2) out.push(wrap(run, item)); }
  data[active] = out; draw(); updateStat();
}
addEventListener('keydown', e => { keys[e.key] = true;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
  if (e.key === 'Enter' && mode === 'draw' && !freehand && !isRect()) { finishCur(); draw(); updateStat(); }
  if (e.key === 'Escape') { cur = null; rectStart = null; draw(); }
  if (e.key === 'd') setMode('draw'); if (e.key === 'e') setMode('erase'); if (e.key === 'p') setMode('pan'); });
addEventListener('keyup', e => { keys[e.key] = false; });

function setMode(m) { mode = m; cv.style.cursor = m === 'pan' ? 'grab' : (m === 'erase' ? 'cell' : 'crosshair');
  ['draw', 'erase', 'pan'].forEach(x => $('m-' + x).classList.toggle('on', x === m)); cur = null; rectStart = null; draw(); }
function setLayer(l) { finishCur(); active = l; KEYS.forEach(x => $('L-' + x).classList.toggle('on', x === l)); draw(); }
$('m-draw').onclick = () => setMode('draw'); $('m-erase').onclick = () => setMode('erase'); $('m-pan').onclick = () => setMode('pan');
$('oneway').onclick = () => { oneway = !oneway; $('oneway').classList.toggle('on', oneway); draw(); };
$('freehand').onclick = () => { freehand = !freehand; $('freehand').classList.toggle('on', freehand); $('freehand').textContent = freehand ? 'Freehand' : 'Click pts'; cur = null; draw(); };
$('opacity').oninput = e => { opacity = e.target.value / 100; draw(); };
$('brush').oninput = e => { brush = +e.target.value; draw(); };
$('btype').onchange = e => { bType = e.target.value; };
$('brot').oninput = e => { bRot = +e.target.value; draw(); };
$('bhgt').oninput = e => { bHgt = e.target.value / 10; };
$('undo').onclick = undo; $('fit').onclick = fitView;
$('clear').onclick = () => { if (confirm('Clear the "' + LAYERS[active].name + '" layer?')) { snapshot(); data[active] = []; cur = null; draw(); updateStat(); } };
const NUDGE = 0.004, SCL = 1.01;
$('al').onclick = () => { bg.offX -= NUDGE; draw(); }; $('ar').onclick = () => { bg.offX += NUDGE; draw(); };
$('au').onclick = () => { bg.offY += NUDGE; draw(); }; $('ad').onclick = () => { bg.offY -= NUDGE; draw(); };
$('sxp').onclick = () => { bg.scaleX *= SCL; draw(); }; $('sxm').onclick = () => { bg.scaleX /= SCL; draw(); };
$('syp').onclick = () => { bg.scaleY *= SCL; draw(); }; $('sym').onclick = () => { bg.scaleY /= SCL; draw(); };
$('areset').onclick = () => { bg = { offX: 0, offY: 0, scaleX: 1, scaleY: 1 }; draw(); };
$('save').onclick = () => { finishCur();
  const blob = new Blob([JSON.stringify({ version: 3, bg, ...data })], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sg1966-trace.json'; a.click(); updateStat(); };
$('load').onchange = e => { const f = e.target.files[0]; if (!f) return; const rd = new FileReader();
  rd.onload = () => { try { const d = JSON.parse(rd.result); if (d.bg) bg = d.bg;
      const nd = { roads: [], mainland: [], islands: [], reservoirs: [], airport: [], buildings: [], foreign: [] };
      nd.roads = (d.roads || []).map(r => Array.isArray(r) ? { pts: r, oneway: false } : r);
      nd.mainland = d.mainland || d.coast || []; nd.islands = d.islands || []; nd.reservoirs = d.reservoirs || d.resv || [];
      nd.airport = d.airport || []; nd.buildings = d.buildings || []; nd.foreign = d.foreign || [];
      data = nd; snapshot(); draw(); updateStat();
    } catch (err) { alert('Bad file: ' + err.message); } };
  rd.readAsText(f); };

fetch('/trace-data.json').then(r => r.json()).then(d => {
  DATA = d; bgImg.src = d.bg.img;
  const boot = () => { resize(); fitView(); updateStat(); $('hint').innerHTML =
    '<b>Pick a layer</b>, hold &amp; drag to trace. <b>Buildings</b>: drag a box for the footprint (pick a type, set <b>rot</b>/<b>tall</b>); the small ring marks the front. <b>Airport</b> = runway line · <b>Roads</b> have a One-way toggle.<br>' +
    'Zoom in (wheel) for detail — the map is high-res. Dashed <span style="color:#ffd23f">yellow</span> = current game coast (it\'s wrong; trace the real one in <span style="color:#7CFC8A">green</span>). <b>Erase</b> fixes mistakes · <b>Save</b> sends it all back.'; };
  bgImg.onload = boot; bgImg.onerror = () => { $('hint').textContent = 'Could not load /trace-map.jpg'; boot(); };
}).catch(err => { $('hint').textContent = 'Could not load /trace-data.json — ' + err.message; });
</script>
</body>
</html>
