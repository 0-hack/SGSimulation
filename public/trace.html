<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>SG 1966 Map Tracer</title>
<style>
  :root { --bar: #1d2330; --accent: #4c8bf5; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; font: 13px/1.4 system-ui, sans-serif; background: #0e1118; color: #e7ebf2; }
  #bar { position: fixed; top: 0; left: 0; right: 0; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
         padding: 6px 8px; background: var(--bar); border-bottom: 1px solid #000; z-index: 10; }
  .grp { display: flex; gap: 4px; align-items: center; padding: 2px 6px; border-right: 1px solid #333a; }
  .grp > small { opacity: .65; }
  button, label.btn, select { background: #2a3243; color: #e7ebf2; border: 1px solid #3a4356; border-radius: 6px;
           padding: 6px 9px; cursor: pointer; font-size: 12.5px; touch-action: manipulation; }
  button:hover { background: #344056; }
  /* touch devices (iPad): bigger tap targets */
  @media (pointer: coarse) { button, label.btn, select { padding: 9px 11px; font-size: 13.5px; } input[type=range] { height: 26px; } }
  #hint.hidden { display: none; }
  button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.lay { border-left: 6px solid var(--c); }
  button.lay.on { background: #344056; border-color: var(--c); }
  button.vis { padding: 5px 7px; font-size: 11.5px; border-left: 6px solid var(--c); opacity: .45; }
  button.vis.on { opacity: 1; }
  input[type=range] { width: 74px; vertical-align: middle; }
  #hint { position: fixed; left: 8px; bottom: 8px; background: #000b; padding: 6px 10px; border-radius: 8px; z-index: 10; max-width: 62ch; }
  #toast { position: fixed; bottom: 58px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #052915;
           padding: 8px 16px; border-radius: 8px; font-weight: 700; z-index: 20; opacity: 0; transition: opacity .4s; pointer-events: none; }
  #stat { margin-left: auto; opacity: .85; text-align: right; font-size: 11.5px; }
  #stat b { color: #fff; }
  canvas { display: block; position: fixed; inset: 0; touch-action: none; cursor: crosshair; }
</style>
</head>
<body>
<div id="bar">
  <div class="grp">
    <button id="m-draw" class="on" title="Draw — shortcut: D">✏️ Draw</button>
    <button id="m-erase" title="Erase — shortcut: E">🧽 Erase</button>
    <button id="m-pan" title="Pan — shortcut: P (or hold Space)">✋ Pan</button>
  </div>
  <div class="grp" id="layers" title="What you're tracing. Draw/Erase act on this layer."><small>trace</small></div>
  <div class="grp">
    <select id="roadtype" title="Type for new roads — Road: standard 2-way (two lanes). Single lane: a narrow lane, one car at a time, both directions. Dirt track: a brown off-track / unpaved road.">
      <option value="road">Road · 2-way</option>
      <option value="single">Single lane</option>
      <option value="dirt">Dirt track</option>
    </select>
    <button id="freehand" class="on" title="Freehand: hold &amp; drag. Click: tap each point/corner; Esc, double-click or click the first dot to finish.">Freehand</button>
    <span><small>brush</small> <input id="brush" type="range" min="4" max="60" value="16"></span>
  </div>
  <div class="grp" id="bldgrp" style="display:none">
    <select id="btype"></select>
    <input id="brot" type="range" min="-180" max="180" value="0">
    <input id="bhgt" type="range" min="3" max="40" value="10">
  </div>
  <div class="grp" title="Jump between the map tracer, the 3D designer and the game">
    <a class="btn" href="/" style="text-decoration:none" title="Back to the game">🎮 Game</a>
    <a class="btn" href="/design.html" style="text-decoration:none" title="Design buildings &amp; landmarks in 3D">🏗 3D Designer</a>
  </div>
  <div class="grp" id="vis" title="Show / hide layers"><small>show</small></div>
  <div class="grp"><span><small>map</small> <input id="opacity" type="range" min="0" max="100" value="55"></span></div>
  <div class="grp" title="Nudge the background map to line it up with your trace">
    <small>align</small>
    <button id="al">◀</button><button id="ar">▶</button><button id="au">▲</button><button id="ad">▼</button>
    <button id="sxm">－X</button><button id="sxp">＋X</button><button id="sym">－Y</button><button id="syp">＋Y</button>
    <button id="areset">⟳</button>
  </div>
  <div class="grp">
    <button id="undo">↶ Undo</button><button id="redo">↷ Redo</button>
    <button id="clear" style="background:#5a2a2a;border-color:#7a3a3a">Clear layer</button>
  </div>
  <div class="grp" title="Write the WHOLE map on screen straight into the game's road data on the host (needs TRACE_EDIT=1). Replaces the network with exactly what you see.">
    <button id="applygame" style="background:#1f5a35;border-color:#2ecc71;color:#fff">💾 Save to map</button>
  </div>
  <div class="grp">
    <button id="save" title="Save the working state in this browser (also autosaves)">💾 Save</button>
    <button id="export" title="Download the WHOLE map (existing roads + your edits) as a JSON file to send back">⬇ Export full map</button>
    <label class="btn">📂 Load<input id="load" type="file" accept="application/json" hidden></label>
    <button id="newsession" title="Start fresh: clear the working session saved in this browser. Use this after your traces have been added to the game, so the old blue lines stop showing ON TOP of the game's roads." style="background:#5a2a2a;border-color:#7a3a3a">🆕 New</button>
    <button id="help" title="Show / hide the instructions">ⓘ</button>
  </div>
  <div id="stat"></div>
</div>
<canvas id="c"></canvas>
<div id="toast"></div>
<div id="hint">Loading map…</div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);
const PI = Math.PI, LS = 'sg1966-trace-autosave';
let DATA = null, bgImg = new Image();

// Map-feature TRACING only. Buildings/houses/landmarks are designed in 3D in
// design.html (they aren't map features), then placed into the game there.
// To DELETE an existing game road there's no separate layer: switch to the
// Erase tool with the Roads layer visible and scrub over it — the erased spots
// are recorded into data.bulldoze (internal) and removed from the game on Apply.
const LAYERS = {
  roads:      { c: '#37d0ff', name: 'Roads',     kind: 'line' },
  mainland:   { c: '#7CFC8A', name: 'Coast',     kind: 'line', closed: true }, // mainland + islands (longest loop = mainland)
  reservoirs: { c: '#c85cff', name: 'Reservoir', kind: 'line', closed: true },
  railway:    { c: '#9fb0c0', name: 'Railway',   kind: 'line' },
  sands:      { c: '#eadbab', name: 'Sands',     kind: 'line' },
  airport:    { c: '#ff5a5a', name: 'Airport ✈', kind: 'line' }, // runway centre-line for plane take-off/landing (NOT a car road)
};
const KEYS = Object.keys(LAYERS);
const TYPES = {};
// Road sub-types the player can trace, each a flag on the road object:
//   standard = 2-way (two lanes, both directions) · single = a NARROW single lane
//   (one car at a time, both directions) · dirt = a brown off-track / unpaved road.
const SINGLE_COLOR = '#ff9f43', DIRT_COLOR = '#8b4513';   // single lane = the old one-way orange; dirt = a clearly darker saddle-brown
const roadStyle = (r, overlay) => r.dirt ? { c: DIRT_COLOR, w: overlay ? 2.2 : 2.0 }
  : r.oneway ? { c: SINGLE_COLOR, w: overlay ? 1.5 : 1.35 }   // single lane: plain, just narrower
  : { c: LAYERS.roads.c, w: overlay ? 2.6 : 2.2 };
// `bulldoze` is an internal accumulator (no longer a visible layer): Erase over
// the Roads layer drops a delete-marker here so the game removes that road.
const blank = () => ({ roads: [], bulldoze: [], mainland: [], reservoirs: [], railway: [], sands: [], airport: [] });
let data = blank();
// What's ALREADY in the game, per layer (read-only reference shown under "show").
let game = { roads: [], mainland: [], reservoirs: [], railway: [], sands: [], airport: [] };
// Marks an existing-feature layer whose overlay was edited by Erase, so the next
// Save rewrites that layer (with the survivors) even if nothing new was drawn in it.
let overlayDirty = {};
let active = 'roads', roadType = 'road', freehand = true, mode = 'draw';   // roadType: road | single | dirt
let vis = {}; KEYS.forEach(k => vis[k] = true); vis.guide = true;
let opacity = 0.55, brush = 16, bType = 'terminal', bRot = 0, bHgt = 1.0;
let view = { zoom: 1, offX: 0, offY: 0, unit: 1000 };
let bg = { offX: 0, offY: 0, scaleX: 1, scaleY: 1 };
let cur = null, curItem = null, resumable = null, history = [], redoStack = [], rectStart = null, rectNow = null;
let sel = null, act = null, grab = null;

for (const k of KEYS) {
  const b = document.createElement('button'); b.className = 'lay' + (k === 'roads' ? ' on' : ''); b.style.setProperty('--c', LAYERS[k].c);
  b.textContent = LAYERS[k].name; b.onclick = () => setLayer(k); b.id = 'L-' + k; $('layers').appendChild(b);
}
for (const k of [...KEYS, 'guide']) {
  const b = document.createElement('button'); b.className = 'vis on'; b.style.setProperty('--c', k === 'guide' ? '#ffd23f' : LAYERS[k].c);
  b.textContent = k === 'guide' ? 'Guide' : LAYERS[k].name.slice(0, 4); b.id = 'v-' + k;
  b.onclick = () => { vis[k] = !vis[k]; b.classList.toggle('on', vis[k]); draw(); }; $('vis').appendChild(b);
}
const RECT = k => LAYERS[k].kind === 'rect';
function refreshTypes() { if (!RECT(active)) return; const list = TYPES[active] || []; $('btype').innerHTML = list.map(([v, n]) => `<option value="${v}">${n}</option>`).join(''); bType = list[0] && list[0][0]; }

function toast(msg, bad) { const t = $('toast'); t.textContent = msg; t.style.background = bad ? '#e2503b' : '#2ecc71'; t.style.color = bad ? '#fff' : '#052915'; t.style.opacity = 1; clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = 0, 1300); }
function autosave(explicit) { try { localStorage.setItem(LS, JSON.stringify({ version: 3, bg, ...data })); if (explicit) toast('Saved in browser'); } catch (e) { if (explicit) toast('Save failed: ' + e.message, true); } }
function applyLoaded(d) { if (d.bg) bg = d.bg; const nd = blank();
  nd.roads = (d.roads || []).map(r => Array.isArray(r) ? { pts: r, oneway: false, dirt: false } : { pts: r.pts, oneway: !!r.oneway, dirt: !!r.dirt, base: !!r.base });
  nd.mainland = (d.mainland || d.coast || []).concat(d.islands || []); // old Islands folded into Coast
  nd.reservoirs = d.reservoirs || d.resv || []; nd.railway = d.railway || []; nd.sands = d.sands || [];
  nd.airport = d.airport || []; nd.bulldoze = d.bulldoze || []; data = nd; }

function snapshot() { history.push(JSON.stringify(data)); if (history.length > 120) history.shift(); redoStack = []; }
function undo() { if (history.length) { redoStack.push(JSON.stringify(data)); data = JSON.parse(history.pop()); cur = null; curItem = null; rectStart = null; sel = null; draw(); updateStat(); } }
function redo() { if (redoStack.length) { history.push(JSON.stringify(data)); data = JSON.parse(redoStack.pop()); cur = null; curItem = null; rectStart = null; sel = null; draw(); updateStat(); } }
function resize() { cv.width = innerWidth; cv.height = innerHeight; draw(); }
addEventListener('resize', resize);

function toScreen(nx, ny) { return [nx * view.unit * view.zoom + view.offX, (1 - ny) * view.unit * view.zoom + view.offY]; }
function toGame(sx, sy) { return [(sx - view.offX) / (view.unit * view.zoom), 1 - (sy - view.offY) / (view.unit * view.zoom)]; }
function nearPx(a, b, px) { return Math.hypot(a[0] - b[0], a[1] - b[1]) <= px / (view.unit * view.zoom); }
function fitView() {
  const x0 = -0.02, x1 = 0.96, y0 = 0.14, y1 = 0.82, w = cv.width, h = cv.height - 50;
  view.unit = 1000; view.zoom = Math.min(w / (x1 - x0), h / (y1 - y0)) / 1000;
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  view.offX = cv.width / 2 - cx * view.unit * view.zoom; view.offY = (cv.height + 50) / 2 - (1 - cy) * view.unit * view.zoom; draw();
}
function bgRect() {
  const b = DATA.bg, cxg = (b.gxL + b.gxR) / 2, cyg = (b.gyB + b.gyT) / 2;
  const X = g => (g - cxg) * bg.scaleX + cxg + bg.offX, Y = g => (g - cyg) * bg.scaleY + cyg + bg.offY;
  const [x0, yTop] = toScreen(X(b.gxL), Y(b.gyT)), [x1, yBot] = toScreen(X(b.gxR), Y(b.gyB));
  return { x: x0, y: yTop, w: x1 - x0, h: yBot - yTop };
}
function strokePoly(pts, close) {
  if (!pts.length) return; ctx.beginPath();
  pts.forEach(([nx, ny], i) => { const [x, y] = toScreen(nx, ny); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  if (close) ctx.closePath();
  if (pts.length === 1) { const [x, y] = toScreen(pts[0][0], pts[0][1]); ctx.arc(x, y, 2, 0, 7); }
  ctx.stroke();
}
function dots(pts) { ctx.fillStyle = '#fff'; for (const [nx, ny] of pts) { const [x, y] = toScreen(nx, ny); ctx.beginPath(); ctx.arc(x, y, 3, 0, 7); ctx.fill(); } }
function bCorners(b) {
  const r = (b.rot || 0) * PI / 180, c = Math.cos(r), s = Math.sin(r), hw = b.w / 2, hh = b.h / 2;
  return [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]].map(([dx, dy]) => [b.cx + dx * c - dy * s, b.cy + dx * s + dy * c]);
}
function rotHandle(b) {
  const r = (b.rot || 0) * PI / 180, gx = b.cx - Math.sin(r) * (b.h / 2), gy = b.cy + Math.cos(r) * (b.h / 2);
  const [sx, sy] = toScreen(gx, gy), [cx, cy] = toScreen(b.cx, b.cy);
  let ux = sx - cx, uy = sy - cy; const l = Math.hypot(ux, uy) || 1; ux /= l; uy /= l;
  return [sx + ux * 22, sy + uy * 22];
}
function drawRect(b, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 2; strokePoly(bCorners(b), true);
  const [lx, ly] = toScreen(b.cx, b.cy); ctx.fillStyle = color; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText((b.type[0] || '?').toUpperCase() + (b.type === 'plane' ? '✈' : ''), lx, ly + 4);
}
function drawHandles(b) {
  for (const [x, y] of bCorners(b).map(([x, y]) => toScreen(x, y))) { ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.rect(x - 4, y - 4, 8, 8); ctx.fill(); ctx.stroke(); }
  const [hx, hy] = rotHandle(b), [cx, cy] = toScreen(b.cx, b.cy);
  ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(hx, hy); ctx.stroke();
  ctx.fillStyle = '#7CFC8A'; ctx.beginPath(); ctx.arc(hx, hy, 5, 0, 7); ctx.fill(); ctx.stroke();
}
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height); ctx.fillStyle = '#0e1118'; ctx.fillRect(0, 0, cv.width, cv.height);
  if (bgImg.complete && bgImg.naturalWidth) { const r = bgRect(); ctx.globalAlpha = opacity; ctx.drawImage(bgImg, r.x, r.y, r.w, r.h); ctx.globalAlpha = 1; }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (vis.guide && DATA) { ctx.lineWidth = 1.3; ctx.strokeStyle = '#ffd23f'; ctx.setLineDash([5, 5]);
    strokePoly(DATA.outline, true); ctx.strokeStyle = '#ffd23f55'; DATA.islands.forEach(p => strokePoly(p, true)); ctx.setLineDash([]); }
  // What's ALREADY in the game (read-only) — drawn under your new traces, in the
  // layer's colour (slightly faded) so you can clearly see it and trace/edit on top.
  ctx.globalAlpha = 0.8;
  for (const k of KEYS) {
    if (!vis[k] || !game[k] || !game[k].length) continue;
    if (k === 'roads') { for (const p of game.roads) { const st = roadStyle(p, true); ctx.strokeStyle = st.c; ctx.lineWidth = st.w; strokePoly(p, false); } continue; }
    ctx.strokeStyle = LAYERS[k].c; ctx.lineWidth = k === 'mainland' ? 2.4 : 2;
    for (const p of game[k]) strokePoly(p, !!LAYERS[k].closed && isClosedPoly(p)); // erased coast arcs draw OPEN
  }
  ctx.globalAlpha = 1;
  for (const k of ['sands', 'reservoirs', 'mainland', 'railway', 'airport', 'roads']) {
    if (!vis[k]) continue; const L = LAYERS[k];
    if (RECT(k)) { data[k].forEach(b => drawRect(b, L.c)); continue; }
    ctx.lineWidth = k === 'mainland' ? 2.6 : 2.2;
    if (k === 'roads') { for (const r of data.roads) { const st = roadStyle(r, false); ctx.strokeStyle = st.c; ctx.lineWidth = st.w; strokePoly(r.pts, false); } } // single lane drawn narrower, dirt drawn brown
    else { ctx.strokeStyle = L.c; for (const p of data[k]) strokePoly(p, false); } // open: never auto-close ends (trace part by part; the game closes polygons itself)
  }
  if (sel && RECT(sel.layer) && data[sel.layer][sel.idx] && vis[sel.layer]) drawHandles(data[sel.layer][sel.idx]);
  if (cur) { let st;
    if (active === 'roads') st = roadStyle(curItem || { oneway: roadType === 'single', dirt: roadType === 'dirt' }, true);
    else st = { c: LAYERS[active].c, w: 2.6 };
    ctx.lineWidth = st.w; ctx.strokeStyle = st.c; ctx.globalAlpha = 0.9; strokePoly(cur, RECT(active)); dots(cur); ctx.globalAlpha = 1; }
  if (rectStart && rectNow) drawRect(rectToBldg(rectStart, rectNow), LAYERS[active].c + '99');
  if (mode === 'erase' && lastPt) { ctx.strokeStyle = '#e2503b'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(lastPt.sx, lastPt.sy, brush, 0, 7); ctx.stroke(); }
}
function rectToBldg(a, b) { return { type: bType, cx: (a[0] + b[0]) / 2, cy: (a[1] + b[1]) / 2, w: Math.abs(a[0] - b[0]), h: Math.abs(a[1] - b[1]), rot: bRot, hgt: bHgt }; }
// fit an oriented rectangle to clicked corner points (orientation = first edge)
function fitRect(pts) {
  if (pts.length < 3) return null;
  const r = Math.atan2(pts[1][1] - pts[0][1], pts[1][0] - pts[0][0]);
  const c = Math.cos(-r), s = Math.sin(-r);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [x, y] of pts) { const lx = x * c - y * s, ly = x * s + y * c; minX = Math.min(minX, lx); maxX = Math.max(maxX, lx); minY = Math.min(minY, ly); maxY = Math.max(maxY, ly); }
  const w = Math.max(0.002, maxX - minX), h = Math.max(0.002, maxY - minY), lcx = (minX + maxX) / 2, lcy = (minY + maxY) / 2;
  return { type: bType, cx: lcx * Math.cos(r) - lcy * Math.sin(r), cy: lcx * Math.sin(r) + lcy * Math.cos(r), w, h, rot: r * 180 / PI, hgt: bHgt };
}
function inBldg(b, gp) {
  const r = (b.rot || 0) * PI / 180, c = Math.cos(-r), s = Math.sin(-r), ox = gp[0] - b.cx, oy = gp[1] - b.cy;
  return Math.abs(ox * c - oy * s) <= b.w / 2 && Math.abs(ox * s + oy * c) <= b.h / 2;
}
function lineOf(item) { return active === 'roads' ? item.pts : item; }
function commitLine() {
  if (active === 'roads') data.roads.push({ pts: cur,
    oneway: curItem ? !!curItem.oneway : roadType === 'single',
    dirt: curItem ? !!curItem.dirt : roadType === 'dirt' });
  else data[active].push(cur);
  resumable = { layer: active, idx: data[active].length - 1 };
}
function finishCur() {
  if (!cur) return;
  if (RECT(active)) { if (cur.length >= 3) { const b = fitRect(cur); if (b) { data[active].push(b); sel = { layer: active, idx: data[active].length - 1 }; syncToolbar(b); } } }
  else if (cur.length >= 2) commitLine();
  cur = null; curItem = null;
}
// try to continue the most-recently-drawn line by clicking near its end
function tryResume(g) {
  if (!resumable || resumable.layer !== active) return false;
  const item = data[active][resumable.idx]; if (!item) return false;
  const pts = lineOf(item); if (!nearPx(g, pts[pts.length - 1], 16)) return false;
  snapshot(); curItem = item; cur = pts; data[active].splice(resumable.idx, 1); resumable = null; cur.push(g); return true;
}
function syncToolbar(b) { bType = b.type; bRot = b.rot || 0; bHgt = b.hgt || 1; $('btype').value = b.type; $('brot').value = bRot; $('bhgt').value = Math.round(bHgt * 10); }
function updateStat() {
  let s = KEYS.map(k => { const n = data[k].length;
    const extra = k === 'roads' ? ` (${data.roads.filter(r => r.oneway).length} single·${data.roads.filter(r => r.dirt).length} dirt)` : '';
    return `<b>${n}</b> ${LAYERS[k].name.slice(0, 4)}${extra}`; }).join(' · ');
  const gameN = KEYS.reduce((t, k) => t + ((game[k] && game[k].length) || 0), 0);
  if (gameN) s += ` · <span style="color:#8ab"><b>${gameN}</b> in&nbsp;game</span>`;
  if (data.bulldoze.length) s += ` · <span style="color:#ff7a7a"><b>${data.bulldoze.length}</b> to&nbsp;delete</span>`;
  $('stat').innerHTML = s;
  autosave();
}
// Load everything ALREADY in the game (roads/coast/reservoirs/railway/sands) so
// each shows under its "show" filter. Reads the game's STATIC data modules
// directly (always served, no API/server-restart needed). Falls back to the
// /api/trace/current endpoint if a module import is blocked.
function loadGameData() {
  const u = '?u=' + Date.now(), W = 1600;
  const toNorm = (p) => [p[0] / W + 0.5, 0.5 - p[1] / W]; // road node [x,z] world -> normalised
  Promise.all([
    import('/js/roads1966.js' + u).catch(() => ({})),
    import('/js/shape.js' + u).catch(() => ({})),
    import('/js/custom1966.js' + u).catch(() => ({})),
  ]).then(([rd, sh, cu]) => {
    const N = rd.ROAD_NODES_1966, E = rd.ROAD_EDGES_1966;
    if (!N || !E) throw new Error('modules unavailable');

    '<b>Tools:</b> <b>D</b>raw · <b>E</b>rase · <b>P</b>an (or hold Space). <b>iPad:</b> draw with the Pencil; one finger pans, two fingers pinch-zoom. Tap <b>ⓘ</b> (or click this box) to hide.<br>' +
    '<b>Pause anytime</b> with <b>Esc</b> — your trace is kept &amp; autosaved; click near a line\'s end to continue. <b>Undo</b>/<b>Redo</b> (Ctrl+Z / Ctrl+Y). <b>Erase</b> clears anything inside the brush across all <b>visible</b> layers (hide a layer to protect it; the <b>brush</b> slider sets the size). <b>Coast</b> traces mainland AND islands.<br>' +
    '<b>Road type</b> (the drop-down, for new roads): <b>Road · 2-way</b> = standard two-lane road; <b><span style="color:' + SINGLE_COLOR + '">Single lane</span></b> = a narrow lane drawn thinner (one car at a time, both directions — no arrows); <b><span style="color:' + DIRT_COLOR + '">Dirt track</span></b> = a brown off-track / unpaved road.<br>' +
    '<b>What\'s already in the game</b> shows for every <b>show</b> filter (roads, coast, reservoirs, railway, sands, airport) as a faded line in that layer\'s colour — trace/edit on top. <b>Delete a game road:</b> show <span style="color:#37d0ff">Roads</span>, switch to <b>Erase</b>, scrub over it, then <b>🎮 Add to game</b>. <b>Airport ✈</b> = runway centre-line (plane take-off/landing, not a car road).<br>' +
    '<b>Save</b> = keep state in this browser · <b>Export</b> = download JSON · <b>🆕 New</b> = clear the saved session (use it once your roads are in the game, so your old blue lines don\'t double up over the game\'s roads; or open <b>trace.html?fresh</b>). Dashed <span style="color:#ffd23f">yellow</span> = current game coast (trace the real one in <span style="color:#7CFC8A">green</span>).'; };
  bgImg.onload = boot; bgImg.onerror = () => { $('hint').textContent = 'Could not load /trace-map.jpg'; boot(); };
}).catch(err => { $('hint').textContent = 'Could not load /trace-data.json — ' + err.message; });
</script>
